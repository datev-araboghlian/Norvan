<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Norvan Façade - Bardage et solutions de façade haut de gamme. Transformez votre bien grâce à un savoir-faire expert." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Norvan Façade | Bardage & Façades Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; background: #0a0a0a; }
      #root { min-height: 100vh; background: #0a0a0a; }
      /* Lightweight pre-React loader so the page never looks empty/white */
      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(120% 80% at 50% 0%, #1b2435 0%, #0a0a0a 70%);
        z-index: 9999;
      }
      #app-loader .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(96, 165, 250, 0.25);
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: appspin 0.8s linear infinite;
      }
      @keyframes appspin { to { transform: rotate(360deg); } }
      .app-ready #app-loader { display: none; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
